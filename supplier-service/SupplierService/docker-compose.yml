version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server
    container_name: sqlserver
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"

  auth-service:
    build: ./auth-service/AuthService
    ports:
      - "5001:80"
    depends_on:
      - sqlserver

  supplier-service:
    build: ./supplier-service/SupplierService
    ports:
      - "5002:80"
    depends_on:
      - sqlserver